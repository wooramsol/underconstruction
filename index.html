<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://www.googletagmanager.com">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3111S3TSQ5"></script>
    <script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOORAMSOL</title>
    <style>
        :root { --border-color: #000; --line-weight: 1px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: Arial, sans-serif; max-width: 1500px; margin: 0 auto; padding: 20px; text-align: center; background-color: #fff; overflow-x: hidden; }
        
        h1 { font-size: 2.2em; margin: 0 0 10px 0; display: inline-block; }
        .contact-info { margin: 0 0 20px 0; line-height: 1.6; white-space: pre-line; }
        .nav-link { position: fixed; padding: 5px 10px; background: rgba(255,255,255,0.8); text-decoration: none; color: blue; z-index: 100; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; }

        .marquee-box { 
            border: none; 
            font-size: 1.5em; 
            padding: 15px 0; 
            margin: 0; 
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }

        .marquee-inner { display: block; text-align: center; }
        .ip-highlight { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* 프로젝트 섹션 레이아웃 */
        .project-item { 
            display: flex; 
            flex-wrap: nowrap; 
            align-items: center; 
            justify-content: flex-start; 
            gap: 30px; 
            margin: 0; 
            padding: 40px 0; /* 패딩 고정 */
            text-align: left; 
            width: 100%; 
        }

        /* 마우스 오버 시 크기/패딩 변화 효과 모두 제거 */

        .project-images { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            flex-shrink: 0; 
        }

        .project-images img { 
            height: 300px; 
            width: auto; 
            object-fit: contain; 
            cursor: pointer; 
            background-color: #f0f0f0; 
            /* 애니메이션 관련 속성 제거 또는 유지해도 변화 없음 */
        }
        
        .project-description { 
            flex: 1; 
            min-width: 350px; 
            line-height: 1.6; 
            white-space: pre-line; 
            margin: 10px; 
            word-break: normal; 
            overflow-wrap: break-word; 
        }
        
        hr { border: 0; border-top: var(--line-weight) solid var(--border-color); margin: 0; width: 100%; }
        .header-line { margin-top: 0; margin-bottom: 0; }
        .tooltip { position: fixed; display: none; background: rgba(0, 0, 0, 0.85); color: #fff; padding: 8px 15px; border-radius: 4px; pointer-events: none; z-index: 9999; font-size: 0.9em; }

        @media (max-width: 850px) {
            body { padding: 10px; }
            h1 { font-size: 1.8em; margin-top: 45px; margin-bottom: 5px; }
            .contact-info { margin-bottom: 15px; font-size: 0.9em; }
            .marquee-box { font-size: 1.1em; padding: 10px 0; }
            .project-item { 
                flex-direction: column; 
                flex-wrap: wrap; 
                text-align: center; 
                padding: 30px 0; 
                gap: 10px; 
            }
            .project-images { width: 100%; gap: 0; }
            .project-images img { width: 100%; height: auto; max-width: 100%; }
            .project-images a:not(.main) { display: none; } 
            .project-description { min-width: 100%; margin: 15px 0; }
        }
    </style>
</head>
<body>
    <a href="opendiary.html" class="nav-link" style="top: 10px; left: 10px;">📖 Open Diary</a>
    <a href="tree.html" class="nav-link" style="top: 10px; right: 10px;">🎄 Merry Christmas</a>

    <header>
        <h1>Ramsol's Repository</h1>
        <div class="contact-info">jeongwooramsol@gmail.com<br><a href="https://www.instagram.com/wooramsol" target="_blank">@wooramsol</a></div>
    </header>

    <div class="marquee-box">
        <div class="marquee-inner" id="marquee-inner">Initialising...</div>
    </div>
    <hr class="header-line">

    <main id="project-container"></main>
    <footer><p>Copyright © 1992 All rights reserved probably?</p></footer>
    <div class="tooltip" id="tooltip"></div>

    <script>
        const projectData = [
            { folder: 'rps_machine', title: 'Rock Paper Scissors Machine', images: ['1.webp'], main: 0, desc: `Why is it unbeatable?\nHuman reaction time is 0.25s, but this AI needs only 0.03s.\nIt reads your move faster than you can blink.` },
            { folder: 'easy_cap', title: 'Easy Cap', images: ['1.webp', '2.webp'], main: 1, desc: `A fizzy drink cap designed for children and the elderly.\nIt can be easily opened using the edge of a table as a lever, requiring less grip strength.\n\nInternational Patent (PCT) Application No. US 20170183130` },
            { folder: 'butane_canister_recycling_tool', title: 'Butane Canister Recycling Tool', images: ['1.webp', '2.webp'], main: 1, desc: `Butane gas canisters are among the most common types of gas containers, but recycling them is often inconvenient—and sometimes even dangerous.\nTo recycle them safely, a hole must be punctured to release pressure and any remaining gas, making the metal safe for disposal.\nMost people need to carry a separate tool for this, but even that small inconvenience can discourage proper recycling.\nThis concept proposes a simple solution: a built-in metal clip in the canister itself.\nInexpensive to manufacture and easy to use, the clip punctures the can when struck against a flat surface.` },
            { folder: 'ad_hoc_products', title: 'Ad Hoc Products', images: ['1.webp', '2.webp'], main: 1, desc: `Mass-production leads to people buying products to meet their needs.\nHowever, according to Adhocism, we might not need to buy products as long as we have a spirit of improvisation.\n(Think Robinson Crusoe, making a raft and then a shelter from the wreck of his ship)\nThese 3D-printed components made from 100% recycled filaments are showing how this ad-hoc approach can replace traditional consumerism.\n\nDownload STL file:\n<a href="https://cults3d.com/en/users/Ramsol/creations" target="_blank">https://cults3d.com/en/users/Ramsol/creations</a>\nAdhocists are everywhere:\n<a href="https://www.instagram.com/adhocists/" target="_blank">https://www.instagram.com/adhocists/</a>` },
            { folder: 'moment_clock', title: 'Moment Clock', images: ['1.webp', '3.webp'], main: 0, desc: `This clock gently reveals the hidden effort behind its quiet movement.\nWith each swing, the battery-powered pendulum reminds us of the unseen force that truly keeps time going.\n\nExhibited at MAISON & OBJET 2017, Paris, France.` },
            { folder: 'time_to_leave_stool', title: 'Time To Leave Stool', images: ['1.webp', '2.webp', '3.webp'], main: 0, desc: `Is your social battery running out?\n”What time is it? Could you please stand up for a moment?“\nThis chair gently encourages your friend to get up and leave.` },
            { folder: 'plate_rack', title: 'Plate Rack Plate', images: ['2.webp', '1.webp', '3.webp'], main: 0, desc: `No need to buy a plate rack.\nIn this set, one out of four plates has holes, allowing them to be stacked.` },
            { folder: 'string_gun', title: 'String Gun', images: ['1.webp'], main: 0, desc: `A toy that spins a string into the air using centrifugal force.\n\nHow does it work:\n<a href="https://youtu.be/T4RtaAkX8ZQ?si=Vk-AJTJIa4Yx_uMP" target="_blank">https://youtu.be/T4RtaAkX8ZQ?si=Vk-AJTJIa4Yx_uMP</a>\nDownload STL file:\n<a href="https://cults3d.com/en/3d-model/naughties/string-gun-ramsol" target="_blank">https://cults3d.com/en/3d-model/naughties/string-gun-ramsol</a>` },
            { folder: 'less_stapler', title: 'Less Stapler', images: ['1.webp', '2.webp'], main: 1, desc: `We could make a stapler with fewer components.` },
            { folder: 'a2_lamp', title: 'A2 Lamp', images: ['1.webp', '2.webp'], main: 1, desc: `A laser-cut table lamp inspired by a classic design.\nDesigned to be made locally using any A2 paper-sized material at a maker space.\nThe 2D lamp drawing is freely available for download under a Creative Commons (CC) licence.\n\nExhibited at Seoul Design Festival 2021, Seoul, Korea.\n\nDownload CAD file:\n<a href="https://cults3d.com/:1063994" target="_blank">https://cults3d.com/:1063994</a>` },
            { folder: 'a4_station', title: 'A4 Station', images: ['1.webp', '2.webp'], main: 1, desc: `A paper clip designed to hold an A4 sheet parallel to a monitor.\nSix small pillars on its side help keep the paper wrinkle-free.\n\nExhibited at Seoul Design Festival 2020, Seoul, Korea.\nPatent number: 10-1765179-0000\nDesign patent number: 30-2015-0049955` },
            { folder: 'side_table', title: 'Bed Side Table', images: ['1.webp', '2.webp'], main: 1, desc: `A bedside table that uses the weight of the bed for support.\nIt can hold up to 2 kg and is made by bending 2mm stainless steel, then covered with fabric.` },
            { folder: 'antibody_incubator', title: 'Antibody Incubator', images: ['1.webp', '2.webp'], main: 1, desc: `A conceptual home healthcare device that incubates targeted antibodies.\nThis device collects data from a biometric chip worn by the user and uses it to design a diet tailored to the user’s specific nutritional needs.\nDesigned for everyday use, it can be mounted under the dining table.\n\nExhibited at Gwangju Design Biennale 2017, Gwangju, Korea.` },
            { folder: 'upcycled_speaker', title: 'Upcycled Speaker', images: ['1.webp', '2.webp'], main: 1, desc: `These upcycled speakers are made from components and wires salvaged from abandoned speakers on the street.\n\nWatch how it was made:\n<a href="https://youtu.be/fQYhwbhCHIw" target="_blank">https://youtu.be/fQYhwbhCHIw</a>` },
            { folder: 'breathfrom', title: 'Breathfrom', images: ['1.webp', '2.webp'], main: 1, desc: `A container for capturing human breath.\nThis balloon can be inflated and kept as a keepsake or given as a gift to commemorate a special moment.\nBREATH offers a unique way to preserve fleeting memories.\nMade entirely from thermoplastic polyurethane, it holds up to 500 millilitres of air, which is roughly the average volume exhaled in a single breath by an adult.\nUsers can write directly on the balloon to note whose breath it contains and the date it was exhaled, preserving it for posterity.\n\nCrowdfunding attempt on Kickstarter was unsuccessful.` },
            { folder: 'lil_dial', title: 'Lil Dial', images: ['1.webp', '2.webp'], main: 1, desc: `A Human Interface Device (HID) designed for efficient video editing.\nUsers can perform custom actions such as moving timelines or adjusting sensitivity by rotating and clicking.` },
            { folder: 'drone_capture_sight', title: 'Drone Capture Sight', images: ['1.webp', '2.webp'], main: 1, desc: `This is a conceptual design for a modular jamming sight against aerial drone threats.\nMounted on the rail of rifles, it allows users to take quick action while aiming at drones.` },
            { folder: 'shower_legs', title: 'Shower Legs', images: ['1.webp', '2.webp'], main: 1, desc: `It is designed to allow the shower head to be placed on the floor without causing splashes.\nIt is made of silicone to fit various sizes.` },
            { folder: 'cup_radio', title: 'Cup Radio', images: ['1.webp', '2.webp'], main: 1, desc: `A radio inspired by paper cup radios.\nTouching the antenna lets you change the receiving frequency.` },
            { folder: 'ear_holder', title: 'Ear Holder', images: ['1.webp', '2.webp'], main: 1, desc: `A pen holder inspired by the act of a carpenter tucking a pencil behind their ear.\nIt can hold a standard-sized pencil.\n\nDownload STL file:\n<a href="https://cults3d.com/en/3d-model/art/pen-holder-for-thinker-ear-pen-holder" target="_blank">https://cults3d.com/en/3d-model/art/pen-holder-for-thinker-ear-pen-holder</a>` },
            { folder: 'pencil_sharpener+holder', title: 'Pencil Sharpener + Holder', images: ['1.webp', '2.webp'], main: 1, desc: `Decorate your desk with your favorite pencil, but don’t miss the built-in sharpener.\n\nDownload STL file:\n<a href="https://cults3d.com/:2217882" target="_blank">https://cults3d.com/:2217882</a>` },
            { folder: 'click_to_fart', title: 'Click to Fart', images: ['1.webp'], main: 0, desc: `A Chrome extension that plays a fart sound every time you click the mouse.\nTry secretly installing it on your friend’s computer!\n\nAvailable on the Chrome Web Store: <a href="https://chromewebstore.google.com/detail/click-to-fart/lkodepkmpjpbgcfcgnbjinpjbmkbhlja?hl=en" target="_blank">Click Here</a>` }
        ];

        async function initMarquee() {
            const inner = document.getElementById('marquee-inner');
            let ip = "Stranger";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch (e) {}
            inner.innerHTML = `Hi <span class="ip-highlight">${ip}</span>, welcome to <a href="passport.webp" target="_blank">Ramsol</a>'s repository.`;
        }

        function renderProjects() {
            const container = document.getElementById('project-container');
            container.innerHTML = projectData.map((p, pIdx) => `
                <section class="project-item">
                    <div class="project-images">
                        ${p.images.map((img, idx) => `
                            <a href="${p.folder}.html" class="${idx === p.main ? 'main' : ''}">
                                <img src="${p.folder}/${img}" title="${p.title}" class="mousehover" loading="${pIdx < 2 ? 'eager' : 'lazy'}">
                            </a>
                        `).join('')}
                    </div>
                    <div class="project-description">${p.desc}</div>
                </section>
                <hr>
            `).join('');
            attachTooltipEvents();
        }

        function attachTooltipEvents() {
            const tooltip = document.getElementById('tooltip');
            document.querySelectorAll('.mousehover').forEach(el => {
                el.addEventListener('mouseenter', (e) => {
                    tooltip.textContent = e.target.title;
                    tooltip.style.display = 'block';
                });
                el.addEventListener('mousemove', (e) => {
                    tooltip.style.left = (e.clientX + 15) + 'px';
                    tooltip.style.top = (e.clientY + 15) + 'px';
                });
                el.addEventListener('mouseleave', () => tooltip.style.display = 'none');
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initMarquee();
            renderProjects();
        });

        window.addEventListener('scroll', () => { 
            const tt = document.getElementById('tooltip');
            if(tt) tt.style.display = 'none'; 
        });
    </script>
</body>
</html>
